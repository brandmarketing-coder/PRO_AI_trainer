services:
  - type: web
    name: oright-pro-trainer
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    # 這些路徑只有後台存檔會動（設定/名單/開關/備份），改它們不需要重新部署。
    # 忽略後，後台存檔的 commit 不會觸發部署，避免存檔造成網站重啟閃爍。
    # （知識庫 knowledge/ 不在忽略清單，上傳知識檔仍會重新部署以重建索引。）
    buildFilter:
      ignoredPaths:
        - "config/**"
        - "data/**"
        - "backups/**"
    envVars:
      # 選擇 AI provider：openai 或 anthropic
      - key: PROVIDER
        value: openai
      # 用 OpenAI 時填這個（在 Render 後台設定，不寫進程式碼）
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      # 若改用 Claude，把 PROVIDER 改成 anthropic 並改填以下（可留著不影響）
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MODEL
        value: claude-sonnet-4-6
